name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Chrome/Edge extension
        run: |
          set -euo pipefail
          mkdir -p dist/chrome
          cp -r content.js content.css manifest.json src pages icons dist/chrome/
          rm -f dist/chrome/icons/icon.psd

          jq \
            --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v | del(.background.scripts) | del(.browser_specific_settings)' \
            manifest.json > dist/chrome/manifest.json

          jq -e . dist/chrome/manifest.json > /dev/null

          cd dist/chrome
          zip -r ../../personal-notes-for-linkedin-${{ steps.version.outputs.version }}-chrome.zip .

      - name: Build Firefox extension
        run: |
          set -euo pipefail
          mkdir -p dist/firefox
          cp -r content.js content.css manifest.json src pages icons dist/firefox/
          rm -f dist/firefox/icons/icon.psd

          jq \
            --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v | del(.background.service_worker)' \
            manifest.json > dist/firefox/manifest.json

          jq -e . dist/firefox/manifest.json > /dev/null

          cd dist/firefox
          zip -r ../../personal-notes-for-linkedin-${{ steps.version.outputs.version }}-firefox.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            personal-notes-for-linkedin-${{ steps.version.outputs.version }}-chrome.zip
            personal-notes-for-linkedin-${{ steps.version.outputs.version }}-firefox.zip
          generate_release_notes: true

      - name: Upload built zips for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: |
            personal-notes-for-linkedin-${{ steps.version.outputs.version }}-chrome.zip
            personal-notes-for-linkedin-${{ steps.version.outputs.version }}-firefox.zip
          if-no-files-found: error

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download built zips
        uses: actions/download-artifact@v4
        with:
          name: extension-zips

      # Submits the new version to Firefox Add-ons (AMO still runs its own review;
      # this only removes the manual upload). Credentials live in the SUBMIT_KEYS
      # repo secret.
      #
      # Chrome is intentionally NOT auto-published: the Chrome Web Store API only
      # accepts a user OAuth token (no service accounts), and the publisher account
      # is enrolled in Google Advanced Protection, which blocks that consent. Upload
      # the chrome zip from the GitHub release manually instead.
      - name: Publish to Firefox Add-ons
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          firefox-file: personal-notes-for-linkedin-${{ steps.version.outputs.version }}-firefox.zip
